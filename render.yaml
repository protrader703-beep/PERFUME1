databases:
  - name: attar-store-db
    databaseName: attar_store
    plan: free

services:
  - type: web
    name: attar-store
    runtime: python
    plan: free
    buildCommand: "bash ./build.sh"
    startCommand: "gunicorn attar_store.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: attar-store-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.0"
